<div class="min-h-screen bg-slate-50 p-4 sm:p-8">
  <div class="max-w-2xl mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold text-slate-800">
        Ajouter une {{ type === 'recette' ? 'Recette' : 'Dépense' }}
      </h1>
      <button
        (click)="goBack()"
        class="px-4 py-2 bg-slate-300 text-slate-700 rounded-lg hover:bg-slate-400 transition"
      >
        ← Retour
      </button>
    </div>

    <!-- Error Message -->
    <div
      *ngIf="error"
      class="mb-4 p-4 bg-slate-100 text-slate-700 rounded-lg border border-slate-300"
    >
      {{ error }}
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-xl shadow-lg p-6 sm:p-8">
      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Montant -->
        <div>
          <label for="transaction-amount" class="block text-sm font-semibold text-slate-700 mb-2">
            Montant (€)
          </label>
          <input
            id="transaction-amount"
            type="number"
            [(ngModel)]="amount"
            name="amount"
            step="0.01"
            min="0"
            placeholder="0.00"
            title="Montant"
            class="w-full px-4 py-3 border-2 border-slate-200 rounded-lg focus:border-emerald-500 focus:outline-none transition"
          />
        </div>

        <!-- Catégorie -->
        <div>
          <label for="transaction-category" class="block text-sm font-semibold text-slate-700 mb-2">
            Catégorie
          </label>
          <div class="flex gap-3">
            <select
              id="transaction-category"
              [(ngModel)]="categoryId"
              name="categoryId"
              title="Catégorie"
              class="flex-1 px-4 py-3 border-2 border-slate-200 rounded-lg focus:border-emerald-500 focus:outline-none transition"
            >
              <option value="" disabled>-- Sélectionner une catégorie --</option>
              <option *ngFor="let cat of categories" [value]="cat.id">
                {{ cat.nom }}
              </option>
            </select>
            <button
              type="button"
              (click)="goToCategories()"
              class="px-4 py-3 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition font-semibold"
            >
              Catégories
            </button>
          </div>
        </div>

        <!-- Description -->
        <div>
          <label for="transaction-description" class="block text-sm font-semibold text-slate-700 mb-2">
            Description (optionnel)
          </label>
          <textarea
            id="transaction-description"
            [(ngModel)]="description"
            name="description"
            placeholder="Ajouter une note..."
            title="Description"
            rows="4"
            class="w-full px-4 py-3 border-2 border-slate-200 rounded-lg focus:border-emerald-500 focus:outline-none transition resize-none"
          ></textarea>
        </div>

        <!-- Buttons -->
        <div class="flex gap-4 pt-4">
          <button
            type="submit"
            [disabled]="loading"
            [class.opacity-50]="loading"
            [class.cursor-not-allowed]="loading"
            [ngClass]="{
              'bg-emerald-600 hover:bg-emerald-700': type === 'recette',
              'bg-slate-700 hover:bg-slate-800': type === 'depense',
            }"
            class="flex-1 px-6 py-3 text-white font-semibold rounded-lg transition disabled:hover:bg-current"
          >
            {{ loading ? 'Création...' : 'Ajouter' }}
          </button>
          <button
            type="button"
            (click)="goBack()"
            class="flex-1 px-6 py-3 bg-slate-300 text-slate-700 font-semibold rounded-lg hover:bg-slate-400 transition"
          >
            Annuler
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
