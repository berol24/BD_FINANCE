<div class="min-h-screen bg-slate-100 flex items-center justify-center p-4 sm:p-6">
  <div class="w-full max-w-2xl rounded-2xl bg-slate-50 border border-slate-200 p-6 sm:p-8">
    <div class="text-center mb-7">
      <div class="mx-auto mb-4 inline-flex h-12 w-12 items-center justify-center rounded-xl bg-emerald-600">
        <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="6" width="20" height="12" rx="2" />
          <circle cx="12" cy="12" r="3" />
          <path d="M6 10h.01M6 14h.01M18 10h.01M18 14h.01" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900">{{ 'auth.registerTitle' | i18n }}</h1>
      <p class="mt-1 text-sm text-slate-500">{{ 'app.name' | i18n }}</p>
    </div>

    <div *ngIf="error" class="mb-5 rounded-xl border border-slate-300 bg-slate-100 p-3.5 text-sm text-slate-700">
      {{ error }}
    </div>

    <form (ngSubmit)="register()" class="space-y-5">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">{{ 'auth.lastName' | i18n }}</label>
          <input
            type="text"
            [(ngModel)]="nom"
            name="nom"
            placeholder="Dupont"
            class="h-11 w-full rounded-xl border border-slate-300 bg-white px-4 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/30"
            [disabled]="loading"
          />
        </div>
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">{{ 'auth.firstName' | i18n }}</label>
          <input
            type="text"
            [(ngModel)]="prenom"
            name="prenom"
            placeholder="Jean"
            class="h-11 w-full rounded-xl border border-slate-300 bg-white px-4 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/30"
            [disabled]="loading"
          />
        </div>
      </div>

      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-700">{{ 'auth.email' | i18n }}</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          [placeholder]="'auth.placeholderEmail' | i18n"
          class="h-11 w-full rounded-xl border border-slate-300 bg-white px-4 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/30"
          [disabled]="loading"
        />
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">{{ 'auth.password' | i18n }}</label>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••"
              class="h-11 w-full rounded-xl border border-slate-300 bg-white px-4 pr-11 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/30"
              [disabled]="loading"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 transition-colors hover:text-slate-700"
              [disabled]="loading"
            >
              <svg *ngIf="!showPassword" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg *ngIf="showPassword" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
        </div>

        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">{{ 'auth.confirmPassword' | i18n }}</label>
          <div class="relative">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="••••••••"
              class="h-11 w-full rounded-xl border border-slate-300 bg-white px-4 pr-11 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/30"
              [disabled]="loading"
            />
            <button
              type="button"
              (click)="toggleConfirmPasswordVisibility()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 transition-colors hover:text-slate-700"
              [disabled]="loading"
            >
              <svg *ngIf="!showConfirmPassword" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg *ngIf="showConfirmPassword" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="h-11 w-full rounded-xl bg-emerald-600 font-semibold text-white transition-colors hover:bg-emerald-700 disabled:opacity-50"
      >
        {{ loading ? ('auth.registerLoading' | i18n) : ('auth.registerButton' | i18n) }}
      </button>
    </form>

    <div class="mt-6 border-t border-slate-200 pt-5 text-center text-sm">
      <span class="text-slate-600">{{ 'auth.alreadyAccount' | i18n }} </span>
      <a routerLink="/auth/login" class="font-semibold text-emerald-600 hover:text-emerald-700">{{ 'auth.loginButton' | i18n }}</a>
    </div>
  </div>
</div>
