<header class="sticky top-0 z-50 bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 text-white shadow-2xl border-b border-slate-700">
  <div class="w-full px-2 sm:px-4 lg:px-8 py-2.5 sm:py-6 max-[360px]:px-1.5">
    <!-- Mobile: Logo + Install button on one line -->
    <div class="flex flex-row justify-between items-center gap-2 mb-3 sm:mb-0">
      <!-- Logo & Branding -->
      <div class="flex items-center gap-2 min-w-0">
        <div class="flex items-center justify-center w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-gradient-to-br from-emerald-400 to-blue-500 shadow-lg flex-shrink-0">
          <svg class="w-5 h-5 sm:w-6 sm:h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="6" width="20" height="12" rx="2" />
            <circle cx="12" cy="12" r="3" />
            <path d="M6 10h.01M6 14h.01M18 10h.01M18 14h.01" />
          </svg>
        </div>
        <div class="min-w-0">
          <h1 class="text-base sm:text-2xl lg:text-3xl font-black bg-gradient-to-r from-emerald-400 to-blue-400 bg-clip-text text-transparent truncate max-[360px]:text-sm">BD Finance</h1>
          <p class="text-xs sm:text-sm text-slate-400 font-medium hidden sm:block">Gestion intelligente</p>
        </div>
      </div>

      <!-- Mobile Install Button - PRIORITY on small screens -->
      <button
        *ngIf="canInstall"
        (click)="onInstall()"
        class="px-2 sm:px-4 py-2 bg-black hover:bg-gray-800 text-white font-bold rounded-lg transition-all duration-200 transform hover:scale-105 shadow-lg text-xs sm:text-sm whitespace-nowrap inline-flex items-center gap-1 sm:gap-2 animate-pulse flex-shrink-0"
        title="Installer l'application"
      >
        <svg class="w-4 h-4 sm:w-5 sm:h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 16V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8" />
          <path d="M7 20h10" />
          <path d="M12 16v4" />
          <path d="M12 12l-3 3h6z" />
        </svg>
        <span class="hidden sm:inline">Installer</span>
      </button>
    </div>

    <!-- Desktop: Full nav bar (hidden on mobile) -->
    <div class="hidden sm:flex items-center gap-2 lg:gap-4 justify-between">
      <!-- Buttons grid -->
      <div class="flex items-center gap-2 lg:gap-4 flex-wrap">
        <!-- Categories Button -->
        <button
          (click)="goToCategories()"
          class="px-3 py-2 bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-semibold rounded-lg transition-all duration-200 transform hover:scale-105 shadow-lg text-sm whitespace-nowrap"
          title="Gérer les catégories"
        >
          <span class="inline-flex items-center gap-2">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
            </svg>
            <span>Catégories</span>
          </span>
        </button>

        <!-- User Profile Button -->
        <button
          (click)="goToProfile()"
          class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-700/50 transition-all duration-200"
          title="Profil"
        >
          <div class="flex items-center justify-center w-8 h-8 rounded-full bg-gradient-to-br from-emerald-500 to-blue-500 text-white font-bold text-xs shadow-lg flex-shrink-0">
            {{ getAvatarInitials() }}
          </div>
          <span class="text-sm font-semibold text-slate-200">{{ user?.prenom }} {{ user?.nom }}</span>
        </button>

        <!-- Language Selector -->
        <div class="relative">
          <button
            (click)="showLanguageMenu = !showLanguageMenu"
            class="px-3 py-2 bg-gradient-to-r from-slate-700 to-slate-600 hover:from-slate-600 hover:to-slate-500 text-white font-semibold rounded-lg transition-all duration-200 text-sm flex items-center gap-2"
            title="Changer la langue"
          >
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10" />
              <path d="M2 12h20" />
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
            {{ currentLanguage.toUpperCase() }}
          </button>
          <div *ngIf="showLanguageMenu" class="absolute right-0 mt-2 bg-slate-800 rounded-lg shadow-xl border border-slate-700 overflow-hidden z-10">
            <button
              (click)="changeLanguage('fr')"
              [class.bg-emerald-600]="currentLanguage === 'fr'"
              class="block w-full px-4 py-2 text-left text-white hover:bg-slate-700 transition-colors text-sm font-semibold"
            >
              🇫🇷 Français
            </button>
            <button
              (click)="changeLanguage('en')"
              [class.bg-emerald-600]="currentLanguage === 'en'"
              class="block w-full px-4 py-2 text-left text-white hover:bg-slate-700 transition-colors text-sm font-semibold"
            >
              🇬🇧 English
            </button>
          </div>
        </div>

        <!-- Share Button -->
        <button
          (click)="onShare()"
          class="px-3 py-2 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-semibold rounded-lg transition-all duration-200 transform hover:scale-105 shadow-lg text-sm whitespace-nowrap"
          title="Partager l'application"
        >
          <span class="inline-flex items-center gap-2">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="18" cy="5" r="3" />
              <circle cx="6" cy="12" r="3" />
              <circle cx="18" cy="19" r="3" />
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
            </svg>
            <span>Partager</span>
          </span>
        </button>

        <!-- Logout Button -->
        <button
          (click)="onLogout()"
          class="px-3 py-2 bg-gradient-to-r from-red-500/20 to-red-600/20 hover:from-red-500/40 hover:to-red-600/40 text-red-300 hover:text-red-200 font-semibold rounded-lg transition-all duration-200 border border-red-500/30 hover:border-red-500/60 text-sm whitespace-nowrap"
        >
          <span class="inline-flex items-center gap-2">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <path d="M16 17l5-5-5-5" />
              <path d="M21 12H9" />
            </svg>
            <span>Déconnexion</span>
          </span>
        </button>
      </div>
    </div>

    <!-- Mobile bottom menu (hidden on desktop, shown on mobile after logo) -->
    <div class="sm:hidden grid grid-cols-5 gap-1 mt-3 max-[360px]:gap-0.5">
      <button
        (click)="goToCategories()"
        class="px-2 py-1.5 max-[360px]:px-1 max-[360px]:py-1 bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-semibold rounded-lg transition-all duration-200 text-xs whitespace-nowrap active:scale-95"
        title="Catégories"
      >
        <svg class="w-4 h-4 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
      </button>

      <button
        (click)="goToProfile()"
        class="px-2 py-1.5 max-[360px]:px-1 max-[360px]:py-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded-lg transition-all duration-200 text-xs whitespace-nowrap active:scale-95"
        title="Profil"
      >
        <svg class="w-4 h-4 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="8" r="4" />
          <path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" />
        </svg>
      </button>

      <button
        (click)="onShare()"
        class="px-2 py-1.5 max-[360px]:px-1 max-[360px]:py-1 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-semibold rounded-lg transition-all duration-200 text-xs whitespace-nowrap active:scale-95"
        title="Partager"
      >
        <svg class="w-4 h-4 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="18" cy="5" r="3" />
          <circle cx="6" cy="12" r="3" />
          <circle cx="18" cy="19" r="3" />
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
        </svg>
      </button>

      <button
        (click)="onLogout()"
        class="px-2 py-1.5 max-[360px]:px-1 max-[360px]:py-1 bg-red-500/20 hover:bg-red-500/40 text-red-300 hover:text-red-200 font-semibold rounded-lg transition-all duration-200 border border-red-500/30 text-xs whitespace-nowrap active:scale-95"
        title="Déconnexion"
      >
        <svg class="w-4 h-4 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <path d="M16 17l5-5-5-5" />
          <path d="M21 12H9" />
        </svg>
      </button>

      <!-- Language picker (mobile) -->
      <div class="relative">
        <button
          (click)="showLanguageMenu = !showLanguageMenu"
          class="w-full px-2 py-1.5 max-[360px]:px-1 max-[360px]:py-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded-lg transition-all duration-200 text-xs flex items-center gap-1 justify-center whitespace-nowrap active:scale-95"
          title="Langue"
        >
          {{ currentLanguage.toUpperCase() }}
        </button>
        <div *ngIf="showLanguageMenu" class="absolute right-0 mt-1 bg-slate-800 rounded-lg shadow-xl border border-slate-700 overflow-hidden z-10">
          <button
            (click)="changeLanguage('fr')"
            [class.bg-emerald-600]="currentLanguage === 'fr'"
            class="block w-full px-3 py-1 text-left text-white hover:bg-slate-700 transition-colors text-xs font-semibold"
          >
            🇫🇷 Français
          </button>
          <button
            (click)="changeLanguage('en')"
            [class.bg-emerald-600]="currentLanguage === 'en'"
            class="block w-full px-3 py-1 text-left text-white hover:bg-slate-700 transition-colors text-xs font-semibold"
          >
            🇬🇧 English
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
