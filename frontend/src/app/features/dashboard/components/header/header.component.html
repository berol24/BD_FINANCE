<header class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur text-white shadow-xl border-b border-slate-700">
  <div class="w-full max-w-7xl mx-auto px-3 sm:px-4 lg:px-8 py-3 sm:py-4 max-[360px]:px-2">
    <div class="flex items-center justify-between gap-3">
      <div class="flex items-center gap-3 min-w-0">
        <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-emerald-600 shadow-md flex-shrink-0">
          <svg class="w-5 h-5 sm:w-6 sm:h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="6" width="20" height="12" rx="2" />
            <circle cx="12" cy="12" r="3" />
            <path d="M6 10h.01M6 14h.01M18 10h.01M18 14h.01" />
          </svg>
        </div>
        <div class="min-w-0">
          <h1 class="text-lg sm:text-2xl font-black text-white truncate max-[360px]:text-base">BD Finance</h1>
          <p class="text-xs text-slate-400 font-medium hidden md:block">{{ 'analytics' | i18n }}</p>
        </div>
      </div>

      <button
        *ngIf="canInstall"
        (click)="onInstall()"
        class="sm:hidden px-2.5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg transition-colors text-xs whitespace-nowrap inline-flex items-center gap-1.5 flex-shrink-0"
        title="Installer l'application"
      >
        <svg class="w-4 h-4 sm:w-5 sm:h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 16V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8" />
          <path d="M7 20h10" />
          <path d="M12 16v4" />
          <path d="M12 12l-3 3h6z" />
        </svg>
        {{ 'install.title' | i18n }}
      </button>
    </div>

    <div class="mt-3 sm:mt-4 flex items-center gap-2 justify-between flex-wrap">
      <div class="hidden sm:flex items-center gap-2">
        <button
          (click)="goToCategories()"
          class="px-3 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg transition-colors text-sm whitespace-nowrap"
          title="Gérer les catégories"
        >
          <span class="inline-flex items-center gap-2">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
            </svg>
            <span>{{ 'category' | i18n }}</span>
          </span>
        </button>

        <button
          (click)="goToProfile()"
          class="flex items-center gap-2 px-2.5 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 transition-colors"
          title="{{ 'profile.title' | i18n }}"
        >
          <div class="flex items-center justify-center w-8 h-8 rounded-full bg-emerald-600 text-white font-bold text-xs shadow-lg flex-shrink-0">
            {{ getAvatarInitials() }}
          </div>
          <span class="text-sm font-semibold text-slate-200">{{ user?.prenom }} {{ user?.nom }}</span>
        </button>
      </div>

      <div class="hidden sm:flex items-center gap-2">
        <button
          *ngIf="canInstall"
          (click)="onInstall()"
          class="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-lg transition-colors text-sm"
          title="Installer l'application"
        >
          {{ 'install.title' | i18n }}
        </button>

        <div class="relative">
          <button
            (click)="showLanguageMenu = !showLanguageMenu"
            class="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-lg transition-colors text-sm flex items-center gap-2"
            title="Changer la langue"
          >
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10" />
              <path d="M2 12h20" />
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
            {{ currentLanguage.toUpperCase() }}
          </button>
          <div *ngIf="showLanguageMenu" class="absolute right-0 mt-2 bg-slate-800 rounded-lg shadow-xl border border-slate-700 overflow-hidden z-10">
            <button
              (click)="changeLanguage('fr')"
              [class.bg-emerald-600]="currentLanguage === 'fr'"
              class="block w-full px-4 py-2 text-left text-white hover:bg-slate-700 transition-colors text-sm font-semibold"
            >
              🇫🇷 Français
            </button>
            <button
              (click)="changeLanguage('en')"
              [class.bg-emerald-600]="currentLanguage === 'en'"
              class="block w-full px-4 py-2 text-left text-white hover:bg-slate-700 transition-colors text-sm font-semibold"
            >
              🇬🇧 English
            </button>
          </div>
        </div>

        <button
          (click)="onLogout()"
          class="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-lg transition-colors border border-slate-600 text-sm whitespace-nowrap"
        >
          <span class="inline-flex items-center gap-2">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <path d="M16 17l5-5-5-5" />
              <path d="M21 12H9" />
            </svg>
            <span>{{ 'logout' | i18n }}</span>
          </span>
        </button>
      </div>

      <div class="sm:hidden flex items-center gap-2 w-full">
        <button
          (click)="goToCategories()"
          class="px-3 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg text-xs"
          title="Catégories"
        >
          {{ 'category' | i18n }}
        </button>
        <button
          (click)="goToProfile()"
          class="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-lg text-xs"
          title="Profil"
        >
          {{ 'profile.title' | i18n }}
        </button>
        <div class="relative ml-auto">
          <!-- Language picker (mobile) -->
        <button
          (click)="showLanguageMenu = !showLanguageMenu"
          class="px-2.5 py-2 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-lg transition-colors text-xs"
          title="Langue"
        >
          {{ currentLanguage.toUpperCase() }}
        </button>
        <div *ngIf="showLanguageMenu" class="absolute right-0 mt-1 bg-slate-800 rounded-lg shadow-xl border border-slate-700 overflow-hidden z-10">
          <button
            (click)="changeLanguage('fr')"
            [class.bg-emerald-600]="currentLanguage === 'fr'"
            class="block w-full px-3 py-1 text-left text-white hover:bg-slate-700 transition-colors text-xs font-semibold"
          >
            🇫🇷 Français
          </button>
          <button
            (click)="changeLanguage('en')"
            [class.bg-emerald-600]="currentLanguage === 'en'"
            class="block w-full px-3 py-1 text-left text-white hover:bg-slate-700 transition-colors text-xs font-semibold"
          >
            🇬🇧 English
          </button>
        </div>
        </div>
        <button
          (click)="onLogout()"
          class="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-lg border border-slate-600 text-xs"
          title="Déconnexion"
        >
          {{ 'logout' | i18n }}
        </button>
      </div>
    </div>
  </div>
</header>
